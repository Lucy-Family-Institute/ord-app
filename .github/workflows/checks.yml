name: Checks

on:
  pull_request:
    branches:
      - '*'
  push:
    branches:
      - 'main'

jobs:
  check_license_headers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '>=1.16'
      - name: Install dependencies
        run: go install github.com/google/addlicense@latest
      - name: addlicense
        run: addlicense -check -c "Open Reaction Database Project Authors" -l apache .

  check_python:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: |
          pipx install poetry

      - name: Install dependencies
        run: |
          poetry install --with dev --no-interaction --no-ansi

      - name: ruff
        run: poetry run ruff check ord_app/

      - name: pytype
        run: poetry run pytype -j auto

  check_javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: clang-format
        run: |
          sudo apt update && sudo apt install clang-format --yes
          # NOTE(kearnes): Run clang-format before installing anything with npm.
          find . -name '*.js' -exec clang-format -n -Werror {} +
