services:
  api:
    image: ord-api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      PG_DSN: "postgresql+psycopg://ord@db:5432/ord"
      APP_ENV: "localhost"
      VITE_AUTH0_DOMAIN: "dev-z4acb31kcl4prqtw.us.auth0.com"
      VITE_AUTH0_AUDIENCE: "https://dev-z4acb31kcl4prqtw.us.auth0.com/api/v2/"
      VITE_AUTH0_ISSUER: "https://dev-z4acb31kcl4prqtw.us.auth0.com/"
      VITE_AUTH0_CLIENT_ID: "6iGbDSlSANtgqktlxmERNKUUM8zx89TR"
    volumes:
      - .:/app
      - /app/.venv
    networks:
      - ord_network

  db:
    image: bitnami/postgresql:17
    environment:
      ALLOW_EMPTY_PASSWORD: "yes"
      POSTGRESQL_DATABASE: ord
      POSTGRESQL_USERNAME: ord
    volumes:
      - db:/bitnami/postgresql
    ports:
      - "5400:5432"
    networks:
      - ord_network
    healthcheck:
      test: pg_isready -U ord
      interval: 5s
      retries: 6
      start_period: 1s

  migrate:
    image: ord-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      PG_DSN: "postgresql+psycopg://ord@db:5432/ord"
    volumes:
      - .:/app
    entrypoint: >
      sh -c "alembic upgrade head"
    networks:
      - ord_network
    restart: "no"

networks:
  ord_network:
    name: ord_network

volumes:
  db: